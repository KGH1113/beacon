services:
  panel:
    build:
      context: .
      dockerfile: ./apps/panel/Dockerfile
    network_mode: host
    environment:
      - NODE_ENV=production
      - BEACON_DAEMON_URL=${BEACON_DAEMON_URL:-http://127.0.0.1:7300}
      - BEACON_PANEL_URL=${BEACON_PANEL_URL:-http://localhost:3000}
      - NEXT_PUBLIC_DAEMON_BASE_URL=${NEXT_PUBLIC_DAEMON_BASE_URL:-http://kgh:7300}
      - NEXT_PUBLIC_SHARE_BASE_URL=${NEXT_PUBLIC_SHARE_BASE_URL:-http://localhost:7300}

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    network_mode: host
    profiles:
      - tunnel
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARED_TUNNEL_TOKEN:-}

  # 초기 권장안은 daemon 을 systemd 로 두는 것.
  # 필요해지면 아래처럼 compose 서비스로 옮길 수 있다.
  # daemon:
  #   build:
  #     context: .
  #     dockerfile: ./apps/daemon/Dockerfile
  #   ports:
  #     - "7300:7300"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - /srv/beacon-shares:/srv/beacon-shares
